name: Process Video Job

on:
  repository_dispatch:
    types: [new_video_job]

jobs:
  ffmpeg-job:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------
      # Checkout
      # -----------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # -----------------------------
      # Install tools (ổn định)
      # -----------------------------
      - name: Install tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y jq curl

      # -----------------------------
      # Check FFmpeg (có sẵn trên runner)
      # -----------------------------
      - name: FFmpeg version
        run: ffmpeg -version

      # -----------------------------
      # Download input files
      # -----------------------------
      - name: Download input files
        run: |
          set -e

          echo "⬇ Download main video..."
          curl -L --fail -o input.mp4 "${{ secrets.MY_DOWNLOAD_URL }}?id=${{ github.event.client_payload.video_url }}&raw=1"

          if [ ! -s input.mp4 ]; then
            echo "❌ input.mp4 lỗi hoặc rỗng"
            exit 1
          fi

          INTRO_URL="${{ github.event.client_payload.intro_url }}"
          if [ ! -z "$INTRO_URL" ] && [ "$INTRO_URL" != "0" ]; then
            echo "⬇ Download intro..."
            curl -L --fail -o intro.mp4 "${{ secrets.MY_INTRO_URL }}?id=$INTRO_URL"

            if [ ! -s intro.mp4 ]; then
              echo "⚠ intro lỗi → bỏ qua"
              rm -f intro.mp4
            fi
          else
            echo "No intro"
          fi

          AUDIO_URL="${{ github.event.client_payload.audio_url }}"
          if [ ! -z "$AUDIO_URL" ] && [ "$AUDIO_URL" != "0" ]; then
            echo "⬇ Download audio..."
            curl -L --fail -o audio.mp3 "$AUDIO_URL"

            if [ ! -s audio.mp3 ]; then
              echo "⚠ audio lỗi → bỏ qua"
              rm -f audio.mp3
            fi
          else
            echo "No audio"
          fi

      # -----------------------------
      # Process video
      # -----------------------------
      - name: Process video
        run: |
          set -e

          chmod +x process_dynamic.sh

          INTRO_FILE=""
          [ -s intro.mp4 ] && INTRO_FILE="intro.mp4"

          AUDIO_FILE=""
          [ -s audio.mp3 ] && AUDIO_FILE="audio.mp3"

          ./process_dynamic.sh \
            input.mp4 \
            "$INTRO_FILE" \
            "${{ github.event.client_payload.flip }}" \
            "$AUDIO_FILE" \
            output_final.mp4

          if [ ! -s output_final.mp4 ]; then
            echo "❌ FFmpeg không tạo file output"
            exit 1
          fi

      # -----------------------------
      # Upload + callback
      # -----------------------------
      - name: Upload & callback
        run: |
          set -e

          echo "⬆ Uploading..."
          response=$(curl -s -w "%{http_code}" -o upload_response.json \
            -F "file=@output_final.mp4" \
            "${{ secrets.UPLOAD_URL }}")

          code=$(printf "%s" "$response" | tail -c 3)

          if [ "$code" != "200" ]; then
            echo "❌ Upload failed ($code)"
            cat upload_response.json
            exit 1
          fi

          output_url=$(jq -r '.output_url' upload_response.json)

          if [ -z "$output_url" ] || [ "$output_url" = "null" ]; then
            echo "❌ Không có output_url"
            exit 1
          fi

          echo "::add-mask::$output_url"
          echo "✅ Upload OK: $output_url"

          echo "📡 Callback..."
          curl -s -X POST \
            -H "Content-Type: application/json" \
            -d "{\"job_id\":\"${{ github.event.client_payload.job_id }}\",\"output_url\":\"$output_url\"}" \
            "${{ secrets.CALLBACK_URL }}"
